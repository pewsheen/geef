<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Geef</title>
    <link rel="stylesheet" href="sidepanel.css">
  </head>
  <body data-ui="app-root">
    <header class="app-header" data-ui="app-header">
      <div class="brand" data-ui="brand">
        <div data-ui="brand-copy">
          <strong data-ui="app-title">Geef</strong>
          <span id="storageInfo" data-ui="storage-info">Storage ready</span>
        </div>
      </div>
      <div class="header-actions" data-ui="header-actions">

        <input id="fileInput" data-ui="media-file-input" type="file" accept="image/gif,video/mp4,video/webm,video/quicktime,.zip,application/zip,application/x-zip-compressed" multiple hidden>
        <button id="addFileButton" class="icon-button add-file-button" data-ui="add-file-button" type="button" title="Add GIF, video, or group ZIP">+</button>
      </div>
    </header>

    <main class="app-shell" data-ui="app-shell">
      <div id="progress" class="progress" data-ui="conversion-progress" hidden>
        <div class="progress-track" data-ui="conversion-progress-track"><span data-ui="conversion-progress-fill"></span></div>
        <strong data-ui="conversion-progress-label">Converting</strong>
      </div>

      <div class="group-row" data-ui="group-row">
        <nav id="groupBar" class="group-bar" data-ui="group-bar" aria-label="GIF groups"></nav>
        <button id="groupEditButton" class="icon-button group-edit-button" data-ui="group-edit-button" type="button" title="Edit groups" aria-label="Edit groups"></button>
      </div>

      <section class="filters" data-ui="library-filters" aria-label="Library filters">
        <input id="searchInput" data-ui="search-input" type="search" placeholder="Search GIFs">
        <div class="sort-field" data-ui="sort-field">
          <span class="sort-icon" data-ui="sort-icon" aria-hidden="true">⇅</span>
          <select id="sortSelect" data-ui="sort-select" aria-label="Sort GIFs">
            <option value="recent">Recently used</option>
            <option value="created">Recently added</option>
            <option value="name">Name</option>
          </select>
        </div>
      </section>

      <section class="section-list" data-ui="section-list" aria-label="GIF library">
        <div id="sectionList" class="section-list-inner" data-ui="section-list-inner"></div>
        <div id="emptyState" class="empty-state" data-ui="empty-state" hidden>
          <strong data-ui="empty-state-title">No GIFs yet</strong>
          <span data-ui="empty-state-copy">Drop a GIF or MP4 here to start the wall.</span>
        </div>
      </section>
    </main>

    <footer class="status-bar" data-ui="status-bar">
      <span id="statusText" data-ui="status-text">Ready</span>
    </footer>

    <dialog id="groupDialog" class="group-dialog" data-ui="group-dialog">
      <form method="dialog" data-ui="group-form">
        <header data-ui="group-dialog-header">
          <strong data-ui="group-dialog-title">Groups</strong>
          <button value="cancel" class="icon-button close-button" data-ui="group-dialog-close" type="submit" title="Close" aria-label="Close"></button>
        </header>

        <div class="group-editor-fixed" data-ui="reserved-groups">
          <span data-ui="reserved-group-all">All</span>
          <span data-ui="reserved-group-favorites">Favorites</span>
        </div>

        <div class="group-archive-row" data-ui="group-archive-row">
          <input id="groupImportInput" data-ui="group-import-input" type="file" accept=".zip,application/zip,application/x-zip-compressed" hidden>
          <button id="groupImportButton" data-ui="group-import-button" type="button">Import ZIP</button>
        </div>

        <div id="groupList" class="group-list" data-ui="group-list"></div>

        <div class="group-add-row" data-ui="group-add-row">
          <input id="groupAddInput" data-ui="group-add-input" type="text" maxlength="32" placeholder="New group">
          <button id="groupAddButton" data-ui="group-add-button" type="button">Add</button>
        </div>
      </form>
    </dialog>

    <dialog id="previewDialog" class="preview-dialog" data-ui="preview-dialog">
      <form method="dialog" data-ui="preview-form">
        <header data-ui="preview-header">
          <strong data-ui="preview-title">GIF details</strong>
          <button value="cancel" class="icon-button close-button" data-ui="preview-close-button" type="submit" title="Close" aria-label="Close"></button>
        </header>

        <img id="previewImage" data-ui="preview-image" alt="">

        <label data-ui="preview-name-field">
          <span data-ui="preview-name-label">Name</span>
          <input id="previewTitle" data-ui="preview-name-input" type="text" maxlength="80">
        </label>

        <label data-ui="preview-group-field">
          <span data-ui="preview-group-label">Group</span>
          <input id="previewGroup" data-ui="preview-group-input" type="text" maxlength="32">
        </label>

        <label class="checkbox-row" data-ui="preview-favorite-field">
          <input id="previewFavorite" data-ui="preview-favorite-input" type="checkbox">
          <span data-ui="preview-favorite-label">Favorite</span>
        </label>

        <menu data-ui="preview-actions">
          <button id="previewPaste" value="paste" data-ui="preview-paste-button" type="button">Paste</button>
          <button id="previewSend" value="send" data-ui="preview-send-button" type="button">Send</button>
          <button id="previewSave" value="save" data-ui="preview-save-button" type="button">Save</button>
          <button id="previewRemove" value="remove" data-ui="preview-remove-button" class="danger-button" type="button">Remove</button>
        </menu>
      </form>
    </dialog>

    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
