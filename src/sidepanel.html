<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Geef</title>
    <link rel="stylesheet" href="sidepanel.css?rev=4" />
  </head>
  <body data-ui="app-root">
    <header class="app-header" data-ui="app-header">
      <div class="brand" data-ui="brand">
        <div data-ui="brand-copy">
          <strong data-ui="app-title">Geef</strong>
          <span id="storageInfo" data-ui="storage-info">Storage ready</span>
        </div>
      </div>
      <div class="header-actions" data-ui="header-actions">
        <input
          id="fileInput"
          data-ui="media-file-input"
          type="file"
          accept="image/gif,video/mp4,.gif,.mp4"
          multiple
          hidden
        />
        <button
          id="addFileButton"
          class="icon-button add-file-button"
          data-ui="add-file-button"
          type="button"
          title="Add GIF or MP4"
        >
          +
        </button>
      </div>
    </header>

    <main class="app-shell" data-ui="app-shell">
      <div id="progress" class="progress" data-ui="conversion-progress" hidden>
        <div class="progress-track" data-ui="conversion-progress-track">
          <span data-ui="conversion-progress-fill"></span>
        </div>
        <strong data-ui="conversion-progress-label">Converting</strong>
      </div>

      <div class="group-row" data-ui="group-row">
        <div class="group-bar-wrap" data-ui="group-bar-wrap">
          <nav
            id="groupBar"
            class="group-bar"
            data-ui="group-bar"
            aria-label="GIF groups"
          ></nav>
        </div>
        <button
          id="groupEditButton"
          class="icon-button group-edit-button"
          data-ui="settings-button"
          type="button"
          title="Settings"
          aria-label="Settings"
        ></button>
      </div>

      <section
        class="filters"
        data-ui="library-filters"
        aria-label="Library filters"
      >
        <input
          id="searchInput"
          data-ui="search-input"
          type="search"
          placeholder="Search GIFs"
        />
      </section>

      <section
        class="section-list"
        data-ui="section-list"
        aria-label="GIF library"
      >
        <div
          id="sectionList"
          class="section-list-inner"
          data-ui="section-list-inner"
        ></div>
        <div id="emptyState" class="empty-state" data-ui="empty-state" hidden>
          <strong data-ui="empty-state-title">No GIFs yet</strong>
          <span data-ui="empty-state-copy"
            >Drop a GIF or MP4 here to start the wall.</span
          >
        </div>
      </section>
    </main>

    <footer class="status-bar" data-ui="status-bar">
      <span id="statusText" data-ui="status-text">Ready</span>
    </footer>

    <dialog
      id="settingsDialog"
      class="settings-dialog"
      data-ui="settings-dialog"
    >
      <form method="dialog" data-ui="settings-form">
        <header data-ui="settings-dialog-header">
          <strong data-ui="settings-dialog-title">Settings</strong>
          <button
            value="cancel"
            class="icon-button close-button"
            data-ui="settings-dialog-close"
            type="submit"
            title="Close"
            aria-label="Close"
          ></button>
        </header>

        <div class="settings-tabs-wrap" data-ui="settings-tabs-wrap">
          <div
            class="settings-tabs"
            data-ui="settings-tabs"
            role="tablist"
            aria-label="Settings sections"
          >
            <button
              id="appearanceTab"
              data-settings-tab="appearance"
              data-ui="appearance-tab"
              type="button"
              role="tab"
              aria-selected="true"
              aria-controls="appearancePanel"
            >
              Appearance
            </button>
            <button
              id="groupTab"
              data-settings-tab="group"
              data-ui="group-tab"
              type="button"
              role="tab"
              aria-selected="false"
              aria-controls="groupPanel"
              tabindex="-1"
            >
              Group
            </button>
            <button
              id="backupTab"
              data-settings-tab="backup"
              data-ui="backup-tab"
              type="button"
              role="tab"
              aria-selected="false"
              aria-controls="backupPanel"
              tabindex="-1"
            >
              Backup
            </button>
            <button
              id="dataTab"
              data-settings-tab="data"
              data-ui="data-tab"
              type="button"
              role="tab"
              aria-selected="false"
              aria-controls="dataPanel"
              tabindex="-1"
            >
              Data
            </button>
          </div>
        </div>

        <section
          id="appearancePanel"
          class="settings-panel appearance-panel"
          data-ui="appearance-settings-panel"
          role="tabpanel"
          aria-labelledby="appearanceTab"
        >
          <label class="setting-field" data-ui="grid-cell-width-field">
            <span data-ui="grid-cell-width-label">Minimum cell width</span>
            <span class="setting-control">
              <input
                id="gridCellMinInput"
                data-ui="grid-cell-width-input"
                type="text"
                inputmode="numeric"
                autocomplete="off"
                placeholder="110px"
                aria-describedby="gridCellMinHint"
              />
              <button
                id="gridCellMinApplyButton"
                data-ui="grid-cell-width-apply-button"
                type="button"
              >
                Apply
              </button>
            </span>
            <small id="gridCellMinHint" data-ui="grid-cell-width-hint"
              >Use pixels. Leave blank to use the 110px default.</small
            >
          </label>
          <div
            class="grid-cell-preview"
            data-ui="grid-cell-preview"
            aria-label="GIF cell size preview"
          >
            <div id="gridCellPreviewTile" class="grid-cell-preview-tile">
              <span>GIF cell</span>
              <strong id="gridCellPreviewLabel">110px</strong>
            </div>
          </div>
          <label class="setting-checkbox" data-ui="show-recently-field">
            <input id="showRecentlyInput" type="checkbox" checked />
            <span>Show recently</span>
          </label>
        </section>

        <section
          id="groupPanel"
          class="settings-panel group-panel"
          data-ui="group-settings-panel"
          role="tabpanel"
          aria-labelledby="groupTab"
          hidden
        >
          <div id="groupList" class="group-list" data-ui="group-list"></div>

          <div class="group-add-row" data-ui="group-add-row">
            <input
              id="groupAddInput"
              data-ui="group-add-input"
              type="text"
              maxlength="32"
              placeholder="New group"
            />
            <button
              id="groupAddButton"
              data-ui="group-add-button"
              type="button"
            >
              Add
            </button>
          </div>
        </section>

        <section
          id="backupPanel"
          class="settings-panel backup-panel"
          data-ui="backup-settings-panel"
          role="tabpanel"
          aria-labelledby="backupTab"
          hidden
        >
          <div class="backup-actions" data-ui="backup-actions">
            <input
              id="groupImportInput"
              data-ui="group-import-input"
              type="file"
              accept=".zip,application/zip,application/x-zip-compressed"
              hidden
            />
            <button
              id="groupImportButton"
              data-ui="group-import-button"
              type="button"
            >
              Import ZIP
            </button>
            <button
              id="exportAllButton"
              data-ui="export-all-button"
              type="button"
            >
              Export all
            </button>
          </div>

          <div class="archive-export-section" data-ui="group-export-section">
            <strong data-ui="group-export-title">Export a group</strong>
            <div
              id="groupExportList"
              class="group-export-list"
              data-ui="group-export-list"
            ></div>
          </div>
        </section>

        <section
          id="dataPanel"
          class="settings-panel data-panel"
          data-ui="data-settings-panel"
          role="tabpanel"
          aria-labelledby="dataTab"
          hidden
        >
          <div class="data-totals" data-ui="data-totals">
            <div data-ui="data-gif-total">
              <span>GIFs</span><strong id="dataGifUsage">0 B</strong>
            </div>
            <div data-ui="data-thumbnail-total">
              <span>Thumbnails</span
              ><strong id="dataThumbnailUsage">0 B</strong>
            </div>
            <div data-ui="data-library-total">
              <span>Library total</span
              ><strong id="dataLibraryUsage">0 B</strong>
            </div>
          </div>
          <button
            id="dataRemoveAllButton"
            class="danger-button"
            data-ui="data-remove-all-button"
            type="button"
          >
            Remove all GIFs
          </button>

          <div class="data-group-section" data-ui="data-group-section">
            <strong data-ui="data-group-title">By group</strong>
            <div
              id="dataGroupUsageList"
              class="data-group-list"
              data-ui="data-group-list"
            ></div>
          </div>
        </section>
      </form>
    </dialog>

    <dialog id="previewDialog" class="preview-dialog" data-ui="preview-dialog">
      <form method="dialog" data-ui="preview-form">
        <header data-ui="preview-header">
          <strong data-ui="preview-title">GIF details</strong>
          <button
            value="cancel"
            class="icon-button close-button"
            data-ui="preview-close-button"
            type="submit"
            title="Close"
            aria-label="Close"
          ></button>
        </header>

        <img id="previewImage" data-ui="preview-image" alt="" />

        <label data-ui="preview-name-field">
          <span data-ui="preview-name-label">Name</span>
          <input
            id="previewTitle"
            data-ui="preview-name-input"
            type="text"
            maxlength="80"
          />
        </label>

        <label data-ui="preview-group-field">
          <span data-ui="preview-group-label">Group</span>
          <input
            id="previewGroup"
            data-ui="preview-group-input"
            type="text"
            maxlength="32"
          />
        </label>

        <label class="checkbox-row" data-ui="preview-favorite-field">
          <input
            id="previewFavorite"
            data-ui="preview-favorite-input"
            type="checkbox"
          />
          <span data-ui="preview-favorite-label">Favorite</span>
        </label>

        <menu data-ui="preview-actions">
          <button
            id="previewPaste"
            value="paste"
            data-ui="preview-paste-button"
            type="button"
          >
            Paste
          </button>
          <button
            id="previewSave"
            value="save"
            data-ui="preview-save-button"
            type="button"
          >
            Save
          </button>
          <button
            id="previewRemove"
            value="remove"
            data-ui="preview-remove-button"
            class="danger-button"
            type="button"
          >
            Remove
          </button>
        </menu>
      </form>
    </dialog>

    <dialog id="importDialog" class="preview-dialog" data-ui="import-dialog">
      <form method="dialog" data-ui="import-form">
        <header>
          <strong>Import ZIP</strong
          ><button
            value="cancel"
            class="icon-button close-button"
            type="submit"
            aria-label="Close"
          ></button>
        </header>
        <label id="importFavoritesField" class="checkbox-row" hidden
          ><input id="importFavorites" type="checkbox" checked /><span
            >Import favorites</span
          ></label
        >
        <div
          id="importGroupList"
          class="group-list"
          data-ui="import-group-list"
        ></div>
        <menu>
          <button value="cancel" type="submit">Cancel</button
          ><button
            id="importConfirmButton"
            class="primary-button"
            type="button"
          >
            Import
          </button>
        </menu>
      </form>
    </dialog>

    <script src="vendor/jszip.min.js"></script>
    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
